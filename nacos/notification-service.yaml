spring:
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:127.0.0.1}:${MYSQL_PORT:3306}/${MYSQL_DB_NOTIFICATION:bk_notification}?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  ai:
    deepseek:
      api-key: ${DEEPSEEK_API_KEY:sk-d74e4570e3784f70880f876a152cb2dd}
      chat:
        api-key: ${DEEPSEEK_API_KEY:sk-d74e4570e3784f70880f876a152cb2dd}
    alibaba:
      a2a:
        server:
          enabled: true
          message-url: /a2a
          agent-card-url: /.well-known/agent.json
          card:
            name: notification-agent
            description: notification delivery agent
            version: 1.0.0
            url: http://127.0.0.1:${server.port}
            default-input-modes: text,application/json
            default-output-modes: text,application/json
            capabilities:
              streaming: true
              push-notifications: false
              state-transition-history: true
            skills:
              - id: notification.send
                name: notification-send
                description: send in-app, email and bot notifications
                tags: notification,message
        nacos:
          server-addr: ${NACOS_SERVER:127.0.0.1:8080}
          namespace: ${NACOS_NAMESPACE:1bde955a-3394-4f3e-a754-70e0aee942dd}
          registry:
            enabled: true
          discovery:
            enabled: true
    mcp:
      server:
        name: notification-mcp-server
        version: 1.0.0
  cloud:
    nacos:
      discovery:
        metadata:
          agent-id: notification-agent
          agent-domains: notification
          agent-runtime-provider: official
          agent-official-payload-mode: structured
          agent-card-path: /.well-known/agent.json
          a2a-path: /a2a
          a2a-task-create-path: /a2a
          a2a-task-status-path: /a2a
          a2a-task-stream-path: /a2a

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when_authorized
    prometheus:
      access: unrestricted
  prometheus:
    metrics:
      export:
        enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
      service: ${spring.application.name}

rocketmq:
  name-server: ${ROCKETMQ_NAME_SERVER:127.0.0.1:9876}
  producer:
    group: ${NOTIFICATION_ROCKETMQ_PRODUCER_GROUP:notification-service-producer}

mybatis-plus:
  mapper-locations: classpath:/mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

notification:
  workflow-events:
    enabled: ${NOTIFICATION_WORKFLOW_EVENTS_ENABLED:true}
    topic: ${AGENT_STREAM_ROCKETMQ_TOPIC:bk.agent.session.stream}
    consumer-group: ${NOTIFICATION_WORKFLOW_EVENTS_CONSUMER_GROUP:notification-service-workflow-events}
    max-attempts: ${NOTIFICATION_WORKFLOW_EVENTS_MAX_ATTEMPTS:3}
  agent:
    model: ${NOTIFICATION_AGENT_MODEL:deepseek-chat}
    temperature: ${NOTIFICATION_AGENT_TEMPERATURE:0.2}
    max-tokens: ${NOTIFICATION_AGENT_MAX_TOKENS:2000}
    system-prompt: |
      You are a notification delivery agent for a real estate brokerage platform.
      Your responsibilities:
      1. Determine the appropriate notification channel (station, email) based on context.
      2. Send messages using the appropriate tools and return delivery status.
      3. Return a structured JSON with: decision (SENT / FAILED / QUEUED), channel, messageId, deliveryStatus, and a summary paragraph.
      Always use available tools to send real notifications rather than inventing results.
