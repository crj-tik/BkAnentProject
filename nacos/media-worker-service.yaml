spring:
  ai:
    deepseek:
      api-key: ${DEEPSEEK_API_KEY:sk-d74e4570e3784f70880f876a152cb2dd}
      chat:
        api-key: ${DEEPSEEK_API_KEY:sk-d74e4570e3784f70880f876a152cb2dd}
    alibaba:
      a2a:
        server:
          enabled: true
          message-url: /a2a
          agent-card-url: /.well-known/agent.json
          card:
            name: media-agent
            description: media task generation and publish preparation agent
            version: 1.0.0
            url: http://127.0.0.1:${server.port}
            default-input-modes: text,application/json
            default-output-modes: text,application/json
            capabilities:
              streaming: true
              push-notifications: false
              state-transition-history: true
            skills:
              - id: media.generate
                name: media-generate
                description: generate media tasks and publish assets
                tags: media,video,publish
        nacos:
          server-addr: ${NACOS_SERVER:127.0.0.1:8080}
          namespace: ${NACOS_NAMESPACE:}
          registry:
            enabled: true
          discovery:
            enabled: true
  cloud:
    nacos:
      discovery:
        metadata:
          agent-id: media-agent
          agent-domains: media
          agent-runtime-provider: official
          agent-official-payload-mode: structured
          agent-card-path: /.well-known/agent.json
          a2a-path: /a2a
          a2a-task-create-path: /a2a
          a2a-task-status-path: /a2a
          a2a-task-stream-path: /a2a

management:
  endpoints:
    web:
      exposure:
        include: health,info

rocketmq:
  name-server: ${ROCKETMQ_NAME_SERVER:127.0.0.1:9876}
  producer:
    group: ${MEDIA_ROCKETMQ_PRODUCER_GROUP:media-worker-producer-group}

media:
  rocketmq:
    generate-topic: ${MEDIA_GENERATE_TOPIC:media_generate_task}
    consumer-group: ${MEDIA_ROCKETMQ_CONSUMER_GROUP:media-worker-consumer-group}
  minio:
    endpoint: ${MINIO_ENDPOINT:http://127.0.0.1:9000}
    access-key: ${MINIO_ACCESS_KEY:minioadmin}
    secret-key: ${MINIO_SECRET_KEY:minioadmin}
    bucket: ${MINIO_BUCKET:generated-assets}
    public-base-url: ${MINIO_PUBLIC_BASE_URL:https://minio.local}
  task:
    sync-wait-timeout-ms: ${MEDIA_TASK_SYNC_WAIT_TIMEOUT_MS:15000}
    sync-poll-interval-ms: ${MEDIA_TASK_SYNC_POLL_INTERVAL_MS:200}
    default-angles:
      - ${MEDIA_TASK_ANGLE_1:living-room-view}
      - ${MEDIA_TASK_ANGLE_2:bedroom-view}
      - ${MEDIA_TASK_ANGLE_3:balcony-view}
      - ${MEDIA_TASK_ANGLE_4:poster-view}
  agent:
    model: ${MEDIA_AGENT_MODEL:deepseek-chat}
    temperature: ${MEDIA_AGENT_TEMPERATURE:0.2}
    max-tokens: ${MEDIA_AGENT_MAX_TOKENS:2000}
    system-prompt: |
      You are a media generation agent for a real estate brokerage platform.
      Your responsibilities:
      1. Submit video generation tasks for property listings with well-crafted prompts.
      2. Query task status and results when requested.
      3. Return a structured JSON with: decision (SUBMITTED / QUERIED / FAILED), taskId, status, publishReady, and a summary paragraph.
      Always use available tools to submit or query real media tasks rather than inventing results.
