spring:
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: lb://auth-service
          predicates:
            - Path=/auth/**
        - id: agent-service
          uri: lb://agent-service
          predicates:
            - Path=/agent/**
        - id: listing-master-service
          uri: lb://listing-master-service
          predicates:
            - Path=/listings/**
        - id: customer-service
          uri: lb://customer-service
          predicates:
            - Path=/customers/**
        - id: business-service
          uri: lb://business-service
          predicates:
            - Path=/business/**
        - id: compare-engine-service
          uri: lb://compare-engine-service
          predicates:
            - Path=/compare/**
        - id: contract-service
          uri: lb://contract-service
          predicates:
            - Path=/contracts/**
        - id: settlement-service
          uri: lb://settlement-service
          predicates:
            - Path=/settlements/**
        - id: promotion-service
          uri: lb://promotion-service
          predicates:
            - Path=/promotions/**
        - id: marketing-content-service
          uri: lb://marketing-content-service
          predicates:
            - Path=/marketing/**
        - id: notification-service
          uri: lb://notification-service
          predicates:
            - Path=/notifications/**

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway

gateway:
  access:
    whitelist-prefixes:
      - /auth/login
      - /auth/logout
      - /actuator
      - /gateway/health
  cors:
    allowed-origin-patterns:
      - "*"
    allowed-methods:
      - GET
      - POST
      - PUT
      - DELETE
      - OPTIONS
    allowed-headers:
      - "*"
    allow-credentials: false
    max-age: 3600
  rate-limit:
    enabled: true
    requests-per-window: 100
    window-seconds: 60
