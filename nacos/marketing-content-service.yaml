spring:
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:127.0.0.1}:${MYSQL_PORT:3306}/${MYSQL_DB_MARKETING:bk_marketing}?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  elasticsearch:
    uris: ${ELASTICSEARCH_URIS:http://127.0.0.1:9200}
  ai:
    deepseek:
      api-key: ${DEEPSEEK_API_KEY:sk-d74e4570e3784f70880f876a152cb2dd}
      chat:
        api-key: ${DEEPSEEK_API_KEY:sk-d74e4570e3784f70880f876a152cb2dd}
    alibaba:
      a2a:
        server:
          enabled: true
          message-url: /a2a
          agent-card-url: /.well-known/agent.json
          card:
            name: marketing-agent
            description: marketing copy generation and publish execution agent
            version: 1.0.0
            url: http://127.0.0.1:${server.port}
            default-input-modes: text,application/json
            default-output-modes: text,application/json
            capabilities:
              streaming: true
              push-notifications: false
              state-transition-history: true
            skills:
              - id: marketing.generate_copy
                name: marketing-generate-copy
                description: generate and adapt marketing copy for listings
                tags: marketing,copy
        nacos:
          server-addr: ${NACOS_SERVER:127.0.0.1:8080}
          namespace: ${NACOS_NAMESPACE:}
          registry:
            enabled: true
          discovery:
            enabled: true
  cloud:
    nacos:
      discovery:
        metadata:
          agent-id: marketing-agent
          agent-domains: marketing
          agent-runtime-provider: official
          agent-official-payload-mode: structured
          agent-card-path: /.well-known/agent.json
          a2a-path: /a2a
          a2a-task-create-path: /a2a
          a2a-task-status-path: /a2a
          a2a-task-stream-path: /a2a

management:
  endpoints:
    web:
      exposure:
        include: health,info

mybatis-plus:
  mapper-locations: classpath:/mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

marketing:
  search:
    use-elasticsearch: ${MARKETING_SEARCH_USE_ES:true}
    write-enabled: ${MARKETING_SEARCH_WRITE_ENABLED:false}
    index-name: ${MARKETING_SEARCH_INDEX:marketing_content}
    sync-mode: ${MARKETING_SEARCH_SYNC_MODE:CANAL}
  agent:
    model: ${MARKETING_AGENT_MODEL:deepseek-chat}
    temperature: ${MARKETING_AGENT_TEMPERATURE:0.2}
    max-tokens: ${MARKETING_AGENT_MAX_TOKENS:2000}
    system-prompt: |
      You are a marketing content generation agent for a real estate brokerage platform.
      Your responsibilities:
      1. Generate compelling marketing copy for property listings tailored to specific platforms (DOUYIN, WECHAT, XIAOHONGSHU).
      2. Create and manage marketing content entries with proper metadata.
      3. Publish marketing content and update publish status.
      4. Return a structured JSON with: intent (generate_copy / publish_prepare / publish), decision (SUCCESS / FAILED / QUEUED), contentId, platform, publishStatus, draftText, and a summary paragraph.
      Always use available tools to create real content rather than inventing results.
      When writing copy, be factual, professional, and highlight the property's unique selling points.
