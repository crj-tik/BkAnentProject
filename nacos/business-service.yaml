spring:
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:127.0.0.1}:${MYSQL_PORT:3306}/${MYSQL_DB_BUSINESS:bk_business}?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DB_BUSINESS:1}
      timeout: ${REDIS_TIMEOUT:3000ms}
      lettuce:
        pool:
          max-active: ${REDIS_POOL_MAX_ACTIVE:8}
          max-idle: ${REDIS_POOL_MAX_IDLE:8}
          min-idle: ${REDIS_POOL_MIN_IDLE:1}
          max-wait: ${REDIS_POOL_MAX_WAIT:3000ms}
  ai:
    deepseek:
      api-key: ${DEEPSEEK_API_KEY:sk-d74e4570e3784f70880f876a152cb2dd}
      chat:
        api-key: ${DEEPSEEK_API_KEY:sk-d74e4570e3784f70880f876a152cb2dd}
    alibaba:
      a2a:
        server:
          enabled: true
          message-url: /a2a
          agent-card-url: /.well-known/agent.json
          card:
            name: trade-agent
            description: trade feasibility and risk analysis agent
            version: 1.0.0
            url: http://127.0.0.1:${server.port}
            default-input-modes: text,application/json
            default-output-modes: text,application/json
            capabilities:
              streaming: true
              push-notifications: false
              state-transition-history: true
            skills:
              - id: trade.analyze
                name: trade-analyze
                description: analyze trade feasibility and risk
                tags: trade,risk
        nacos:
          server-addr: ${NACOS_SERVER:127.0.0.1:8080}
          namespace: ${NACOS_NAMESPACE:1bde955a-3394-4f3e-a754-70e0aee942dd}
          registry:
            enabled: true
          discovery:
            enabled: true
  cloud:
    nacos:
      discovery:
        metadata:
          agent-id: trade-agent
          agent-domains: trade
          agent-runtime-provider: official
          agent-official-payload-mode: structured
          agent-card-path: /.well-known/agent.json
          a2a-path: /a2a
          a2a-task-create-path: /a2a
          a2a-task-status-path: /a2a
          a2a-task-stream-path: /a2a

management:
  endpoints:
    web:
      exposure:
        include: health,info

mybatis-plus:
  mapper-locations: classpath:/mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

business:
  ranking:
    use-redis: ${BUSINESS_RANKING_USE_REDIS:true}
  redis:
    enabled: ${BUSINESS_REDIS_ENABLED:true}
    ranking-key-prefix: ${BUSINESS_RANKING_KEY_PREFIX:business:ranking:}
    ranking-ttl-hours: ${BUSINESS_RANKING_TTL_HOURS:24}

trade:
  agent:
    model: ${TRADE_AGENT_MODEL:deepseek-chat}
    temperature: ${TRADE_AGENT_TEMPERATURE:0.2}
    max-tokens: ${TRADE_AGENT_MAX_TOKENS:2000}
    system-prompt: |
      You are a trade feasibility and risk analysis agent for a real estate brokerage platform.
      Your responsibilities:
      1. Analyze trade requests based on available business data.
      2. Assess risk levels (low, medium, high) using KPI data, listing turnover, agent workload, and store dashboard metrics.
      3. Return a structured JSON assessment with: decision (PROCEED / MANUAL_REVIEW / RISK_ALERT / REJECT), riskLevel, riskFactors (list), supportingData (object), recommendedActions (list), and a summary paragraph.
      Always call available tools to get real data before making a judgment.
      If you cannot determine the answer with confidence, set decision to MANUAL_REVIEW.
