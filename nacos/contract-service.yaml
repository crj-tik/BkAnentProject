spring:
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:127.0.0.1}:${MYSQL_PORT:3306}/${MYSQL_DB_CONTRACT:bk_contract}?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  ai:
    deepseek:
      api-key: ${DEEPSEEK_API_KEY:sk-d74e4570e3784f70880f876a152cb2dd}
      chat:
        api-key: ${DEEPSEEK_API_KEY:sk-d74e4570e3784f70880f876a152cb2dd}
    alibaba:
      a2a:
        server:
          enabled: true
          message-url: /a2a
          agent-card-url: /.well-known/agent.json
          card:
            name: contract-agent
            description: contract parsing and risk review agent
            version: 1.0.0
            url: http://127.0.0.1:${server.port}
            default-input-modes: text,application/json
            default-output-modes: text,application/json
            capabilities:
              streaming: true
              push-notifications: false
              state-transition-history: true
            skills:
              - id: contract.review
                name: contract-review
                description: review contract content and risks
                tags: contract,review
        nacos:
          server-addr: ${NACOS_SERVER:127.0.0.1:8080}
          namespace: ${NACOS_NAMESPACE:1bde955a-3394-4f3e-a754-70e0aee942dd}
          registry:
            enabled: true
          discovery:
            enabled: true
  cloud:
    nacos:
      discovery:
        metadata:
          agent-id: contract-agent
          agent-domains: contract
          agent-runtime-provider: official
          agent-official-payload-mode: structured
          agent-card-path: /.well-known/agent.json
          a2a-path: /a2a
          a2a-task-create-path: /a2a
          a2a-task-status-path: /a2a
          a2a-task-stream-path: /a2a

management:
  endpoints:
    web:
      exposure:
        include: health,info

mybatis-plus:
  mapper-locations: classpath:/mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

contract:
  reminder:
    enabled: true
    pending-sign-days: 3
    pending-sign-cron: 0 30 9 * * ?
  integration:
    ocr-provider: ${CONTRACT_OCR_PROVIDER:mock-ocr-provider}
    esign-provider: ${CONTRACT_ESIGN_PROVIDER:mock-esign-provider}
  agent:
    model: ${CONTRACT_AGENT_MODEL:deepseek-chat}
    temperature: ${CONTRACT_AGENT_TEMPERATURE:0.2}
    max-tokens: ${CONTRACT_AGENT_MAX_TOKENS:2000}
    system-prompt: |
      You are a contract review and risk analysis agent for a real estate brokerage platform.
      Your responsibilities:
      1. Review contracts for completeness, risks, and compliance.
      2. Check seal status, archive status, OCR summaries, and attachment completeness.
      3. Return a structured JSON assessment with: decision (PROCEED / MANUAL_REVIEW / RISK_ALERT / REJECT), riskLevel, riskFactors (list), contractStatus, recommendedActions (list), and a summary paragraph.
      Always call available tools to get real contract data before making a judgment.
      If you cannot determine the answer with confidence, set decision to MANUAL_REVIEW.
