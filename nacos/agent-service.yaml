spring:
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:127.0.0.1}:${MYSQL_PORT:3306}/${MYSQL_DB_AGENT:bk_agent}?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  ai:
    deepseek:
      api-key: ${DEEPSEEK_API_KEY:sk-d74e4570e3784f70880f876a152cb2dd}
      chat:
        api-key: ${DEEPSEEK_API_KEY:sk-d74e4570e3784f70880f876a152cb2dd}
    dashscope:
      api-key: ${DASHSCOPE_API_KEY:sk-2b5cfc81166341e188e411892cca3dfa}
      embedding:
        enabled: true
        options:
          model: ${DASHSCOPE_EMBEDDING_MODEL:text-embedding-v3}
          dimensions: ${DASHSCOPE_EMBEDDING_DIMENSIONS:1024}
    alibaba:
      a2a:
        nacos:
          server-addr: ${NACOS_SERVER:127.0.0.1:8080}
          namespace: ${NACOS_NAMESPACE:1bde955a-3394-4f3e-a754-70e0aee942dd}
          registry:
            enabled: false
          discovery:
            enabled: true
    vectorstore:
      milvus:
        initialize-schema: false
    mcp:
      client:
        request-timeout: ${AGENT_MCP_REQUEST_TIMEOUT:15s}
        initialization-timeout: ${AGENT_MCP_INITIALIZATION_TIMEOUT:10s}
        connections:
          business-mcp-server:
            url: ${BUSINESS_MCP_ENDPOINT:http://127.0.0.1:9010/mcp}
            type: STREAMABLE
          compare-mcp-server:
            url: ${COMPARE_MCP_ENDPOINT:http://127.0.0.1:9006/mcp}
            type: STREAMABLE
          marketing-mcp-server:
            url: ${MARKETING_MCP_ENDPOINT:http://127.0.0.1:9008/mcp}
            type: STREAMABLE
          contract-mcp-server:
            url: ${CONTRACT_MCP_ENDPOINT:http://127.0.0.1:9012/mcp}
            type: STREAMABLE
          settlement-mcp-server:
            url: ${SETTLEMENT_MCP_ENDPOINT:http://127.0.0.1:9013/mcp}
            type: STREAMABLE
          notification-mcp-server:
            url: ${NOTIFICATION_MCP_ENDPOINT:http://127.0.0.1:9003/mcp}
            type: STREAMABLE
          media-mcp-server:
            url: ${MEDIA_MCP_ENDPOINT:http://127.0.0.1:9007/mcp}
            type: STREAMABLE

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when_authorized
    prometheus:
      access: unrestricted
  prometheus:
    metrics:
      export:
        enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
      service: ${spring.application.name}

mybatis-plus:
  mapper-locations: classpath:/mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

agent:
  memory:
    base-url: ${MEMORY_SERVICE_BASE_URL:http://127.0.0.1:9011}
  chat:
    model: ${AGENT_CHAT_MODEL:${AGENT_DEEPSEEK_MODEL:deepseek-chat}}
    temperature: ${AGENT_CHAT_TEMPERATURE:${AGENT_DEEPSEEK_TEMPERATURE:0.2}}
    max-tokens: ${AGENT_CHAT_MAX_TOKENS:${AGENT_DEEPSEEK_MAX_TOKENS:1600}}
    top-p: ${AGENT_CHAT_TOP_P:${AGENT_DEEPSEEK_TOP_P:1.0}}
    default-top-k: ${AGENT_CHAT_DEFAULT_TOP_K:${AGENT_DEEPSEEK_DEFAULT_TOP_K:4}}
    system-prompt: ${AGENT_CHAT_SYSTEM_PROMPT:${AGENT_DEEPSEEK_SYSTEM_PROMPT:}}
  milvus:
    default-collection: ${MILVUS_COLLECTION:agent_knowledge}
    listing-collection: ${MILVUS_LISTING_COLLECTION:listing_knowledge}
    primary-field: ${MILVUS_PRIMARY_FIELD:doc_id}
    vector-field: ${MILVUS_VECTOR_FIELD:embedding}
    text-field: ${MILVUS_TEXT_FIELD:content}
    source-type-field: ${MILVUS_SOURCE_TYPE_FIELD:source_type}
    source-id-field: ${MILVUS_SOURCE_ID_FIELD:source_id}
    metadata-field: ${MILVUS_METADATA_FIELD:metadata}
    metric-type: ${MILVUS_METRIC_TYPE:COSINE}
    index-type: ${MILVUS_INDEX_TYPE:IVF_FLAT}
    index-parameters: ${MILVUS_INDEX_PARAMETERS:{"nlist":1024}}
    embedding-dimension: ${MILVUS_EMBEDDING_DIMENSION:1024}
    max-text-length: ${MILVUS_MAX_TEXT_LENGTH:8192}
  rag:
    keyword-top-k: ${AGENT_RAG_KEYWORD_TOP_K:20}
    vector-top-k: ${AGENT_RAG_VECTOR_TOP_K:20}
    rerank-top-k: ${AGENT_RAG_RERANK_TOP_K:10}
    vector-similarity-threshold: ${AGENT_RAG_VECTOR_SIMILARITY_THRESHOLD:0.7}
    rerank-endpoint: ${AGENT_RAG_RERANK_ENDPOINT:https://dashscope.aliyuncs.com/api/v1/services/rerank/text-rerank/text-rerank}
    rerank-api-key: ${AGENT_RAG_RERANK_API_KEY:${DASHSCOPE_API_KEY:sk-2b5cfc81166341e188e411892cca3dfa}}
    rerank-model: ${AGENT_RAG_RERANK_MODEL:qwen3-rerank}
  distributed:
    supervisor-agent-id: ${SUPERVISOR_AGENT_ID:supervisor-agent}
    refresh-interval-seconds: ${AGENT_DISCOVERY_REFRESH_INTERVAL_SECONDS:30}
    a2a:
      discovery-provider: ${AGENT_A2A_DISCOVERY_PROVIDER:official}
    catalog:
      strict-nacos: ${AGENT_CATALOG_STRICT_NACOS:true}
    rate-limit:
      enabled: ${AGENT_RATE_LIMIT_ENABLED:true}
      provider: ${AGENT_RATE_LIMIT_PROVIDER:memory}
      window-seconds: ${AGENT_RATE_LIMIT_WINDOW_SECONDS:60}
      default-per-window: ${AGENT_RATE_LIMIT_DEFAULT_PER_WINDOW:60}
      supervisor-tasks-per-window: ${AGENT_RATE_LIMIT_SUPERVISOR_TASKS_PER_WINDOW:60}
      supervisor-async-tasks-per-window: ${AGENT_RATE_LIMIT_SUPERVISOR_ASYNC_TASKS_PER_WINDOW:40}
      supervisor-workflows-per-window: ${AGENT_RATE_LIMIT_SUPERVISOR_WORKFLOWS_PER_WINDOW:30}
      supervisor-async-workflows-per-window: ${AGENT_RATE_LIMIT_SUPERVISOR_ASYNC_WORKFLOWS_PER_WINDOW:20}
    gray-release:
      enabled: true
      strategy-version: "v2"
      prefer-async-a2a: false
      user-ids:
        - "test-user-001"        # 只灰度测试用户
      domains: {}
      preferred-agent-ids:
        trade: "trade-agent"
        compare: "compare-agent"
      route-override-domains: {}
      versioned-preferred-agent-ids:
        v1:
          trade: "trade-agent-legacy"
        v2:
          trade: "trade-agent-v2"
      versioned-route-override-domains:
        v1: {}
        v2: {}
    event-audit:
      max-active-events: ${AGENT_EVENT_AUDIT_MAX_ACTIVE_EVENTS:5000}
      archive-enabled: ${AGENT_EVENT_AUDIT_ARCHIVE_ENABLED:true}
      max-archived-events: ${AGENT_EVENT_AUDIT_MAX_ARCHIVED_EVENTS:10000}
      retention-seconds: ${AGENT_EVENT_AUDIT_RETENTION_SECONDS:86400}
    async-runtime:
      enabled: ${AGENT_ASYNC_RUNTIME_ENABLED:true}
      dispatch-interval-ms: ${AGENT_ASYNC_RUNTIME_DISPATCH_INTERVAL_MS:1000}
      dispatch-batch-size: ${AGENT_ASYNC_RUNTIME_DISPATCH_BATCH_SIZE:10}
    planning:
      llm-enabled: ${AGENT_PLANNING_LLM_ENABLED:false}
      allow-fallback: ${AGENT_PLANNING_ALLOW_FALLBACK:true}
      strategy: ${AGENT_PLANNING_STRATEGY:rule-first}
    stream:
      provider: ${AGENT_STREAM_PROVIDER:memory}
      rocketmq:
        topic: ${AGENT_STREAM_ROCKETMQ_TOPIC:bk.agent.session.stream}
        consumer-group: ${AGENT_STREAM_ROCKETMQ_CONSUMER_GROUP:agent-service-session-stream}
        producer-group: ${AGENT_STREAM_ROCKETMQ_PRODUCER_GROUP:agent-service-session-stream-producer}
    discovery-enabled: ${AGENT_DISCOVERY_ENABLED:true}
    agent-card-path: ${AGENT_CARD_PATH:/.well-known/agent.json}
    agents: {}

rocketmq:
  name-server: ${ROCKETMQ_NAME_SERVER:127.0.0.1:9876}
  producer:
    group: ${AGENT_STREAM_ROCKETMQ_PRODUCER_GROUP:agent-service-session-stream-producer}

milvus:
  enabled: ${MILVUS_ENABLED:true}
  endpoint: ${MILVUS_ENDPOINT:http://127.0.0.1:19530}
  token: ${MILVUS_TOKEN:root:Milvus}
  database: ${MILVUS_DATABASE:default}
  username: ${MILVUS_USERNAME:root}
  password: ${MILVUS_PASSWORD:Milvus}
  uri: ${MILVUS_URI:}
