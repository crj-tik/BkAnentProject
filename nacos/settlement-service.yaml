spring:
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:127.0.0.1}:${MYSQL_PORT:3306}/${MYSQL_DB_SETTLEMENT:bk_settlement}?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  ai:
    deepseek:
      api-key: ${DEEPSEEK_API_KEY:sk-d74e4570e3784f70880f876a152cb2dd}
      chat:
        api-key: ${DEEPSEEK_API_KEY:sk-d74e4570e3784f70880f876a152cb2dd}
    alibaba:
      a2a:
        server:
          enabled: true
          message-url: /a2a
          agent-card-url: /.well-known/agent.json
          card:
            name: settlement-agent
            description: settlement calculation and payout preparation agent
            version: 1.0.0
            url: http://127.0.0.1:${server.port}
            default-input-modes: text,application/json
            default-output-modes: text,application/json
            capabilities:
              streaming: true
              push-notifications: false
              state-transition-history: true
            skills:
              - id: settlement.prepare
                name: settlement-prepare
                description: prepare settlement and payout batch
                tags: settlement,payout
        nacos:
          server-addr: ${NACOS_SERVER:127.0.0.1:8080}
          namespace: ${NACOS_NAMESPACE:1bde955a-3394-4f3e-a754-70e0aee942dd}
          registry:
            enabled: true
          discovery:
            enabled: true
  cloud:
    nacos:
      discovery:
        metadata:
          agent-id: settlement-agent
          agent-domains: settlement
          agent-runtime-provider: official
          agent-official-payload-mode: structured
          agent-card-path: /.well-known/agent.json
          a2a-path: /a2a
          a2a-task-create-path: /a2a
          a2a-task-status-path: /a2a
          a2a-task-stream-path: /a2a

management:
  endpoints:
    web:
      exposure:
        include: health,info

mybatis-plus:
  mapper-locations: classpath:/mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

settlement:
  batch:
    batch-no-prefix: ${SETTLEMENT_BATCH_PREFIX:SETBATCH}
  auto-generate:
    enabled: ${SETTLEMENT_AUTO_GENERATE_ENABLED:true}
    cron: ${SETTLEMENT_AUTO_GENERATE_CRON:0 15 2 * * ?}
    month-offset: ${SETTLEMENT_AUTO_GENERATE_MONTH_OFFSET:0}
  agent:
    model: ${SETTLEMENT_AGENT_MODEL:deepseek-chat}
    temperature: ${SETTLEMENT_AGENT_TEMPERATURE:0.2}
    max-tokens: ${SETTLEMENT_AGENT_MAX_TOKENS:2000}
    system-prompt: |
      You are a settlement and commission calculation agent for a real estate brokerage platform.
      Your responsibilities:
      1. Calculate commissions based on deal amounts and settlement rules.
      2. Prepare payout batches and summarize monthly commissions.
      3. Assess payout readiness and flag any issues.
      4. Return a structured JSON assessment with: decision (PROCEED / MANUAL_REVIEW / HOLD), payoutStatus, commissionAmount, monthlySummaryAvailable, recommendedActions (list), and a summary paragraph.
      Always call available tools to get real settlement data before making a judgment.
      If you cannot determine the answer with confidence, set decision to MANUAL_REVIEW.
