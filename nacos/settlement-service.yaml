spring:
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:127.0.0.1}:${MYSQL_PORT:3306}/${MYSQL_DB_SETTLEMENT:bk_settlement}?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  ai:
    alibaba:
      a2a:
        server:
          enabled: true
          message-url: /a2a
          agent-card-url: /.well-known/agent.json
          card:
            name: settlement-agent
            description: settlement calculation and payout preparation agent
            version: 1.0.0
            url: http://127.0.0.1:${server.port}
            default-input-modes: text,application/json
            default-output-modes: text,application/json
            capabilities:
              streaming: true
              push-notifications: false
              state-transition-history: true
            skills:
              - id: settlement.prepare
                name: settlement-prepare
                description: prepare settlement and payout batch
                tags: settlement,payout
        nacos:
          enabled: true
          server-addr: ${NACOS_SERVER:127.0.0.1:8848}
          namespace: ${NACOS_NAMESPACE:}
          group: DEFAULT_GROUP
          registry:
            enabled: true
          discovery:
            enabled: true
  cloud:
    nacos:
      discovery:
        metadata:
          agent-id: settlement-agent
          agent-domains: settlement
          agent-runtime-provider: official
          agent-official-payload-mode: structured
          agent-card-path: /.well-known/agent.json
          a2a-path: /a2a
          a2a-task-create-path: /a2a
          a2a-task-status-path: /a2a
          a2a-task-stream-path: /a2a

management:
  endpoints:
    web:
      exposure:
        include: health,info

mybatis-plus:
  mapper-locations: classpath:/mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

settlement:
  batch:
    batch-no-prefix: ${SETTLEMENT_BATCH_PREFIX:SETBATCH}
  auto-generate:
    enabled: ${SETTLEMENT_AUTO_GENERATE_ENABLED:true}
    cron: ${SETTLEMENT_AUTO_GENERATE_CRON:0 15 2 * * ?}
    month-offset: ${SETTLEMENT_AUTO_GENERATE_MONTH_OFFSET:0}
