server:
  port: 9010

spring:
  application:
    name: business-service
  ai:
    alibaba:
      a2a:
        server:
          enabled: true
          message-url: /a2a
          agent-card-url: /.well-known/agent.json
          card:
            name: trade-agent
            description: 负责交易可行性分析与风险判断
            version: 1.0.0
            url: http://127.0.0.1:${server.port}
            default-input-modes: text,application/json
            default-output-modes: text,application/json
            capabilities:
              streaming: true
              push-notifications: false
              state-transition-history: true
            skills:
              - id: trade.analyze
                name: 交易分析
                description: 进行交易可行性分析与风险判断
                tags: trade,risk
        nacos:
          enabled: true
          server-addr: ${NACOS_SERVER:127.0.0.1:8848}
          namespace: ${NACOS_NAMESPACE:}
          group: DEFAULT_GROUP
          registry:
            enabled: true
          discovery:
            enabled: true
  cloud:
    discovery:
      enabled: false
    service-registry:
      auto-registration:
        enabled: false
    nacos:
      discovery:
        enabled: false
      config:
        import-check:
          enabled: false
---
spring:
  config:
    activate:
      on-profile: "!local"
    import: optional:nacos:${spring.application.name}.yaml?group=DEFAULT_GROUP&refreshEnabled=true
  cloud:
    discovery:
      enabled: true
    service-registry:
      auto-registration:
        enabled: true
    nacos:
      discovery:
        enabled: true
        server-addr: ${NACOS_SERVER:127.0.0.1:8848}
        metadata:
          agent-id: trade-agent
          agent-domains: trade
          agent-runtime-provider: official
          agent-official-payload-mode: structured
          agent-card-path: /.well-known/agent.json
          a2a-path: /a2a
          a2a-task-create-path: /a2a
          a2a-task-status-path: /a2a
          a2a-task-stream-path: /a2a
      config:
        server-addr: ${NACOS_SERVER:127.0.0.1:8848}
        file-extension: yaml

dubbo:
  application:
    name: business-service
  protocol:
    name: dubbo
    port: 20890
  registry:
    address: nacos://${NACOS_SERVER:127.0.0.1:8848}
