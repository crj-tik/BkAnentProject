server:
  port: 9010

spring:
  application:
    name: business-service
  cloud:
    discovery:
      enabled: false
    service-registry:
      auto-registration:
        enabled: false
    nacos:
      discovery:
        enabled: false
      config:
        import-check:
          enabled: false
---
spring:
  config:
    activate:
      on-profile: "!local"
    import: optional:nacos:${spring.application.name}.yaml?group=DEFAULT_GROUP&refreshEnabled=true
  cloud:
    discovery:
      enabled: true
    service-registry:
      auto-registration:
        enabled: true
    nacos:
      discovery:
        enabled: true
        server-addr: ${NACOS_SERVER:127.0.0.1:8848}
      config:
        server-addr: ${NACOS_SERVER:127.0.0.1:8848}
        file-extension: yaml

dubbo:
  application:
    name: business-service
  protocol:
    name: dubbo
    port: 20890
  registry:
    address: nacos://${NACOS_SERVER:127.0.0.1:8848}
